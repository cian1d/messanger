<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сообщения</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        form { margin-bottom: 30px; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; display: block; }
        .message { border-bottom: 1px solid #eee; padding: 10px 0; }
        button { background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Оставить сообщение</h2>
    <form method="POST">
        <textarea name="message" placeholder="Ваше сообщение..." required></textarea>
        <button type="submit">Отправить</button>
    </form>

    <h2>История</h2>
    {% for msg in messages|reverse %}
        <div class="message">{{ msg.text }}</div>
    {% endfor %}
</body>
</html>
